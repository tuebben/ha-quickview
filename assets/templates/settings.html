<!DOCTYPE html><html><head><meta charset='UTF-8'><link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap' rel='stylesheet'><link href='https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css' rel='stylesheet'><style>  body { font-family: 'Inter', sans-serif; background: white; color: #1e293b; margin: 0; padding: 0; overflow: hidden; }  .container { height: 100vh; display: flex; flex-direction: column; }  .header { padding: 20px 24px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }  .title { font-size: 20px; font-weight: 600; color: #0f172a; margin: 0; }  .search-box { padding: 12px 24px; background: white; border-bottom: 1px solid #f1f5f9; }  .search-input { width: 100%; padding: 10px 16px; border: 1px solid #e2e8f0; border-radius: 8px; outline: none; transition: border-color 0.2s; box-sizing: border-box; font-size: 14px; }  .search-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }  .list-container { flex: 1; overflow-y: auto; padding: 8px 0 12px; }  .section { margin-top: 10px; }  .section-head { display: flex; justify-content: space-between; align-items: center; padding: 4px 24px 8px; }  .section-title { font-size: 12px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: #64748b; }  .section-count { font-size: 11px; color: #94a3b8; }  .entity-item { display: flex; align-items: center; padding: 10px 24px; transition: background 0.1s; cursor: pointer; user-select: none; }  .entity-item:hover { background: #f8fafc; }  .entity-item.checked { background: #f8fafc; }  .entity-item.drag-source { opacity: 0.55; }  .entity-item.drop-before { box-shadow: inset 0 2px 0 #3b82f6; }  .entity-item.drop-after { box-shadow: inset 0 -2px 0 #3b82f6; }  .entity-item input[type='checkbox'] { width: 18px; height: 18px; margin-right: 16px; cursor: pointer; }  .entity-drag { width: 16px; margin-right: 8px; color: #94a3b8; cursor: grab; display: inline-flex; align-items: center; justify-content: center; }  .entity-info { display: flex; flex-direction: column; min-width: 0; }  .entity-name { font-weight: 500; font-size: 14px; color: #1e293b; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }  .entity-id { font-size: 12px; color: #64748b; font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }  .empty { padding: 8px 24px; font-size: 12px; color: #94a3b8; font-style: italic; }  .footer { padding: 16px 24px; background: #f8fafc; border-top: 1px solid #e2e8f0; display: flex; justify-content: flex-end; gap: 12px; }  .btn { padding: 8px 20px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }  .btn-primary { background: #3b82f6; color: white; }  .btn-primary:hover { background: #2563eb; }  .btn-secondary { background: white; border-color: #e2e8f0; color: #475569; }  .btn-secondary:hover { background: #f1f5f9; border-color: #cbd5e1; }  ::-webkit-scrollbar { width: 8px; }  ::-webkit-scrollbar-track { background: transparent; }  ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }  ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }</style></head><body>  <div class='container'>    <div class='header'><h1 class='title'>{{TXT_AREA_PREFIX}} {{AREA_NAME}}</h1><div id='status' style='font-size:10px;color:red'>{{TXT_READY}}</div></div>    <div class='search-box'><input type='text' id='search' class='search-input' placeholder='{{TXT_SEARCH_PLACEHOLDER}}' oninput='render()'></div>    <div id='list' class='list-container'>      <div class='section'><div class='section-head'><span class='section-title'>{{TXT_SELECTED}}</span><span id='selected-count' class='section-count'></span></div><div id='selected-list'></div></div>      <div class='section'><div class='section-head'><span class='section-title'>{{TXT_AVAILABLE}}</span><span id='available-count' class='section-count'></span></div><div id='available-list'></div></div>    </div>    <div class='footer'>      <button class='btn btn-secondary' onclick='window.OnJS_CancelSettings("")'>{{TXT_CANCEL}}</button>      <button class='btn btn-primary' onclick='save()'>{{TXT_SAVE}}</button>    </div>  </div>  <script>    let allEntities = [];    let dragEntityId = '';    function normalizeCheckedFirst() {      const checked = allEntities.filter(e => !!e.checked);      const unchecked = allEntities.filter(e => !e.checked);      allEntities = checked.concat(unchecked);    }    function clearDropClasses() {      document.querySelectorAll('#selected-list .entity-item.drop-before, #selected-list .entity-item.drop-after').forEach(el => el.classList.remove('drop-before', 'drop-after'));    }    function reorderChecked(sourceId, targetId, before) {      if (!sourceId || !targetId || sourceId === targetId) return false;      const checked = allEntities.filter(e => !!e.checked);      const unchecked = allEntities.filter(e => !e.checked);      const srcIndex = checked.findIndex(e => e.id === sourceId);      const tgtIndex = checked.findIndex(e => e.id === targetId);      if (srcIndex < 0 || tgtIndex < 0) return false;      const moved = checked.splice(srcIndex, 1)[0];      let insertIndex = checked.findIndex(e => e.id === targetId);      if (insertIndex < 0) insertIndex = checked.length;      if (!before) insertIndex += 1;      checked.splice(insertIndex, 0, moved);      allEntities = checked.concat(unchecked);      return true;    }    function init(data) {      document.getElementById('status').innerText = '{{TXT_INITIALIZING}}';      if (!data) { document.getElementById('status').innerText = '{{TXT_ERROR_NO_DATA}}'; return; }      const visible = Array.isArray(data.visible) ? data.visible : [];      const all = Array.isArray(data.all) ? data.all : [];      const byId = new Map();      all.forEach(e => { if (e && e.id) byId.set(e.id, { id: e.id, name: e.name || e.id, checked: false }); });      const ordered = [];      visible.forEach(id => {        const ent = byId.get(id);        if (ent) { ent.checked = true; ordered.push(ent); byId.delete(id); }      });      byId.forEach(ent => ordered.push(ent));      allEntities = ordered;      render();      document.getElementById('status').innerText = '{{TXT_LOADED_PREFIX}} ' + allEntities.length;      document.getElementById('status').style.color = 'green';    }    function renderSection(container, items, selected, allowDrag) {      if (!container) return;      container.textContent = '';      if (!items.length) {        const empty = document.createElement('div');        empty.className = 'empty';        empty.textContent = selected ? '{{TXT_NO_SELECTED_ENTITIES}}' : '{{TXT_NO_AVAILABLE_ENTITIES}}';        container.appendChild(empty);        return;      }      items.forEach(e => {        const div = document.createElement('div');        div.className = 'entity-item' + (e.checked ? ' checked' : '');        div.dataset.eid = e.id || '';        div.draggable = !!(selected && allowDrag);        if (selected) {          div.addEventListener('dragstart', ev => {            if (!allowDrag) { ev.preventDefault(); return; }            dragEntityId = e.id;            div.classList.add('drag-source');            if (ev.dataTransfer) ev.dataTransfer.setData('text/plain', e.id);          });          div.addEventListener('dragend', () => { dragEntityId = ''; clearDropClasses(); div.classList.remove('drag-source'); });          div.addEventListener('dragover', ev => {            if (!allowDrag || !dragEntityId || dragEntityId === e.id) return;            ev.preventDefault();            const r = div.getBoundingClientRect();            const before = ev.clientY < (r.top + r.height / 2);            clearDropClasses();            div.classList.add(before ? 'drop-before' : 'drop-after');          });          div.addEventListener('dragleave', () => { div.classList.remove('drop-before', 'drop-after'); });          div.addEventListener('drop', ev => {            if (!allowDrag || !dragEntityId || dragEntityId === e.id) return;            ev.preventDefault();            const r = div.getBoundingClientRect();            const before = ev.clientY < (r.top + r.height / 2);            if (reorderChecked(dragEntityId, e.id, before)) render();          });        }        const d = document.createElement('span');        d.className = 'entity-drag' + (selected ? ' mdi mdi-drag-vertical' : '');        div.appendChild(d);        const check = document.createElement('input');        check.type = 'checkbox';        check.checked = !!e.checked;        check.addEventListener('click', ev => ev.stopPropagation());        check.addEventListener('change', () => { e.checked = check.checked; normalizeCheckedFirst(); render(); });        const info = document.createElement('div');        info.className = 'entity-info';        const name = document.createElement('span');        name.className = 'entity-name';        name.textContent = e.name || e.id || '';        const id = document.createElement('span');        id.className = 'entity-id';        id.textContent = e.id || '';        info.appendChild(name);        info.appendChild(id);        div.addEventListener('click', ev => {          if (ev.target && ev.target.tagName === 'INPUT') return;          e.checked = !e.checked;          normalizeCheckedFirst();          render();        });        div.appendChild(check);        div.appendChild(info);        container.appendChild(div);      });    }    function render() {      const q = (document.getElementById('search').value || '').toLowerCase();      const allowDrag = (q === '');      const selectedAll = allEntities.filter(e => !!e.checked);      const availableAll = allEntities.filter(e => !e.checked);      const selected = selectedAll.filter(e => (e.name || '').toLowerCase().includes(q) || (e.id || '').toLowerCase().includes(q));      const available = availableAll.filter(e => (e.name || '').toLowerCase().includes(q) || (e.id || '').toLowerCase().includes(q));      const sc = document.getElementById('selected-count');      const ac = document.getElementById('available-count');      if (sc) sc.textContent = `${selectedAll.length}`;      if (ac) ac.textContent = `${availableAll.length}`;      renderSection(document.getElementById('selected-list'), selected, true, allowDrag);      renderSection(document.getElementById('available-list'), available, false, false);    }    function save() {      const visible = allEntities.filter(e => e.checked).map(e => e.id);      if (window.OnJS_SaveSettings) window.OnJS_SaveSettings(visible);    }    window.addEventListener('load', () => {      setTimeout(() => {        if (window.OnJS_ReadySettings) window.OnJS_ReadySettings('');      }, 200);    });  </script></body></html>
