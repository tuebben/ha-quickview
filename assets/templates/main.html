s ease; border: 1px solid #e9eef5; }  .card:hover { box-shadow: 0 10px 28px rgba(15,23,42,0.11), 0 2px 8px rgba(15,23,42,0.06); border-color: #dbe3ee; }  .card.drag-source { opacity: 0.55; }  .card.drop-before { box-shadow: inset 0 3px 0 #3b82f6, 0 10px 28px rgba(15,23,42,0.11), 0 2px 8px rgba(15,23,42,0.06); }  .card.drop-after { box-shadow: inset 0 -3px 0 #3b82f6, 0 10px 28px rgba(15,23,42,0.11), 0 2px 8px rgba(15,23,42,0.06); }  .card-header { background: transparent; padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #edf2f7; }  .area-name { font-weight: 600; font-size: 15px; color: #1e293b; }  .area-sensors { display: flex; gap: 8px; align-items: center; font-size: 12px; color: #475569; }  body.design-mode .area-sensors .sensor { display: none; }  .design-controls { display: none; align-items: center; gap: 6px; margin-left: 4px; }  body.design-mode .design-controls { display: flex; }  .control-btn { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 13px; color: #475569; }  .control-btn.drag-btn { cursor: grab; }  .control-btn.drag-btn:active { cursor: grabbing; }  .sensor { display: flex; align-items: center; gap: 4px; background: #f8fafc; padding: 3px 8px; border-radius: 16px; border: 1px solid #e2e8f0; font-weight: 500; }  .settings-btn { background: white; border: 1px solid #e2e8f0; border-radius: 8px; width: 28px; height: 28px; display: none; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; font-size: 14px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }  body.design-mode .settings-btn { display: flex; }  .settings-btn:hover { background: #f8fafc; border-color: #cbd5e1; transform: rotate(45deg); color: #334155; }  .card.area-hidden { opacity: 0.48; }  body:not(.design-mode) .card.area-hidden { display: none !important; }  .toast { position: fixed; right: 14px; bottom: 14px; background: #0f172a; color: #fff; padding: 8px 12px; border-radius: 8px; font-size: 12px; opacity: 0; transform: translateY(8px); transition: opacity .2s ease, transform .2s ease; pointer-events: none; z-index: 9999; }  .toast.show { opacity: 0.95; transform: translateY(0); }  .card-content { padding: 10px 12px; }  .entity-list { list-style: none; padding: 0; margin: 0; }  .entity-item { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 6px 0; font-size: 13px; color: #64748b; border-bottom: 1px solid #f8fafc; transition: color 0.2s; }  .entity-item:hover { color: #334155; }  .entity-item:last-child { border-bottom: none; }  .entity-item::before { display: none; content: none; }  .entity-drag { display: none; color: #94a3b8; margin-right: 6px; cursor: grab; }  body.design-mode .entity-drag { display: inline-flex; }  .entity-remove { display: none; color: #94a3b8; margin-right: 4px; cursor: pointer; }  .entity-remove:hover { color: #ef4444; }  body.design-mode .entity-remove { display: inline-flex; }  body.design-mode .entity-item { cursor: grab; }  body.design-mode .entity-item:active { cursor: grabbing; }  .entity-item.drag-source { opacity: 0.55; }  .entity-item.drop-before { box-shadow: inset 0 2px 0 #3b82f6; }  .entity-item.drop-after { box-shadow: inset 0 -2px 0 #3b82f6; }  .entity-item.switch-item::before { display: none; }  .entity-item.light-item::before { display: none; }  .entity-name-label { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }  .entity-value { color: #0f172a; font-weight: 600; margin-left: 6px; white-space: nowrap; font-size: 12px; }  .switch-pill { position: relative; width: 34px; height: 18px; border-radius: 999px; background: #cbd5e1; border: 1px solid #94a3b8; flex-shrink: 0; }  .switch-pill::after { content: ''; position: absolute; top: 1px; left: 1px; width: 14px; height: 14px; background: #fff; border-radius: 50%; box-shadow: 0 1px 2px rgba(0,0,0,0.2); transition: transform .2s ease; }  .switch-pill.on { background: #22c55e; border-color: #16a34a; }  .switch-pill.on::after { transform: translateX(16px); }  .light-pill { position: relative; width: 34px; height: 18px; border-radius: 999px; background: #cbd5e1; border: 1px solid #94a3b8; flex-shrink: 0; }  .light-pill::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 7px; height: 7px; border-radius: 50%; background: #f8fafc; opacity: 0.8; }  .light-pill.on { background: #facc15; border-color: #eab308; }  .light-pill.on::after { opacity: 1; }  @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }</style></head><body>  <div class='header'><div class='title'>HA QuickView</div>  <div class='header-right'><button id='design-mode-btn' class='design-toggle-btn' onclick='toggleDesignMode()'><span class='mdi mdi-pencil-ruler'></span><span>Design</span></button><button id='design-done-btn' class='design-done-btn' onclick='finishDesignMode()'><span class='mdi mdi-check-bold'></span><span>Fertig</span></button><span id='status-badge' class='status-badge'></span></div></div>  <div id='app-grid' class='grid'></div>  <div id='toast' class='toast'></div>  <script>    let entityNames = {};    let entityData = {};    let designMode = false;    let dragAreaId = '';    let dragAreaSourceEl = null;    let dragEntityId = '';    let dragEntityAreaId = '';    let dragEntityDirty = false;    let dragEntitySourceEl = null;    let masonryRaf = 0;    let lastUIData = null;    let toastTimer = null;    function showToast(msg) {      const t = document.getElementById('toast');      if (!t) return;      t.textContent = msg || '';      t.classList.add('show');      if (toastTimer) clearTimeout(toastTimer);      toastTimer = setTimeout(() => t.classList.remove('show'), 1200);    }    function setDesignMode(on) {      designMode = !!on;      document.body.classList.toggle('design-mode', designMode);      const btn = document.getElementById('design-mode-btn');      if (btn) btn.classList.toggle('active', designMode);      if (designMode) clearMasonryLayout();      if (lastUIData) updateUI(lastUIData);      if (!designMode) scheduleMasonryLayout();    }    function finishDesignMode() {      if (!designMode) return;      setDesignMode(false);      showToast('Layout gespeichert');    }    function toggleDesignMode() {      if (designMode) { finishDesignMode(); return; }      setDesignMode(true);    }    function PB_DesignLayout(action, areaId, value) {      if (!window.OnJS_DesignLayout) return;      window.OnJS_DesignLayout(action, areaId || '', value);    }    function emitAreaOrder() {      const grid = document.getElementById('app-grid');      if (!grid) return;      const ids = Array.from(grid.children).map(c => c.dataset ? c.dataset.areaId : '').filter(Boolean);      PB_DesignLayout('reorder', ids, '');    }    function emitEntityOrder(areaId, ul) {      if (!areaId || !ul) return;      const ids = Array.from(ul.children).map(li => li.dataset ? li.dataset.eid : '').filter(Boolean);      PB_DesignLayout('entity_order', areaId, ids);    }    function clearEntityDropMarkers(ul) {      if (!ul) return;      Array.from(ul.children).forEach(li => li.classList.remove('drop-before', 'drop-after'));    }    function clearAreaDropMarkers(grid) {      if (!grid) return;      Array.from(grid.children).forEach(c => c.classList.remove('drop-before', 'drop-after'));    }    function clearMasonryLayout() {      const grid = document.getElementById('app-grid');      if (!grid) return;      grid.classList.remove('masonry');      grid.style.height = '';      Array.from(grid.children).forEach(card => {        card.style.position = '';        card.style.left = '';        card.style.top = '';        card.style.width = '';      });    }    function applyMasonryLayout() {      if (designMode) return;      const grid = document.getElementById('app-grid');      if (!grid) return;      const cards = Array.from(grid.children);      if (cards.length === 0) { clearMasonryLayout(); return; }      const gap = 12;      const minCol = 280;      const gridWidth = grid.clientWidth;      const cols = Math.max(1, Math.floor((gridWidth + gap) / (minCol + gap)));      if (cols <= 1) { clearMasonryLayout(); return; }      grid.classList.add('masonry');      const colWidth = Math.floor((gridWidth - gap * (cols - 1)) / cols);      const heights = Array(cols).fill(0);      cards.forEach(card => { card.style.width = `${colWidth}px`; });      cards.forEach(card => {        let col = 0;        for (let i = 1; i < heights.length; i++) if (heights[i] < heights[col]) col = i;        const left = col * (colWidth + gap);        const top = heights[col];        card.style.position = 'absolute';        card.style.left = `${left}px`;        card.style.top = `${top}px`;        heights[col] = top + card.offsetHeight + gap;      });      const maxHeight = Math.max.apply(null, heights);      grid.style.height = `${Math.max(0, maxHeight - gap)}px`;    }    function scheduleMasonryLayout() {      if (designMode) return;      if (masonryRaf) cancelAnimationFrame(masonryRaf);      masonryRaf = requestAnimationFrame(() => {        masonryRaf = 0;        applyMasonryLayout();      });    }    function setLoading(isLoading, message) {      if (!isLoading && message) showToast(message);    }    const HA_BASE_URL = '{{HA_BASE_URL}}';    const HA_TOKEN = '{{HA_TOKEN}}';    const DEMO_MODE = {{DEMO_MODE}}; /* von PureBasic gesetzt */    const DEMO_DATA_INLINE = '{{DEMO_DATA_INLINE}}';    const DEMO_DATA_URL = '../demo-data.json';    const DEMO_REFRESH_MS = 30000;    let demoRefreshTimer = null;    let demoData = null;    let haWs = null;    let haReconnectTimer = null;    let eventRefreshTimer = null;    let areaRegistryById = {};    function normalizeWsUrl(url) {      if (!url) return '';      if (url.startsWith('https://')) return 'wss://' + url.substring(8) + '/api/websocket';      if (url.startsWith('http://')) return 'ws://' + url.substring(7) + '/api/websocket';      return '';    }    function scheduleRefreshFromEvent() {      if (designMode) return;      if (eventRefreshTimer) return;      eventRefreshTimer = setTimeout(() => {        eventRefreshTimer = null;        PB_Refresh();      }, 500);    }    function connectHAEvents() {      const wsUrl = normalizeWsUrl(HA_BASE_URL);      if (!wsUrl || !HA_TOKEN) return;      if (haWs && (haWs.readyState === WebSocket.OPEN || haWs.readyState === WebSocket.CONNECTING)) return;      try {        haWs = new WebSocket(wsUrl);      } catch (e) {        return;      }      haWs.onopen = () => {        if (haReconnectTimer) { clearTimeout(haReconnectTimer); haReconnectTimer = null; }      };      haWs.onmessage = (ev) => {        let msg = null;        try { msg = JSON.parse(ev.data); } catch (e) { return; }        if (!msg || !msg.type) return;        if (msg.type === 'auth_required') {          haWs.send(JSON.stringify({ type: 'auth', access_token: HA_TOKEN }));        } else if (msg.type === 'auth_ok') {          haWs.send(JSON.stringify({ id: 1, type: 'subscribe_events', event_type: 'state_changed' }));          haWs.send(JSON.stringify({ id: 2, type: 'config/area_registry/list' }));        } else if (msg.type === 'result' && msg.id === 2 && msg.success && Array.isArray(msg.result)) {          const map = {};          msg.result.forEach(a => {            if (!a) return;            const aid = String(a.area_id || a.id || '');            if (!aid) return;            map[aid] = {              temperature_entity_id: String(a.temperature_entity_id || ''),              humidity_entity_id: String(a.humidity_entity_id || '')            };          });          areaRegistryById = map;          if (lastUIData) updateUI(lastUIData);        } else if (msg.type === 'event') {          scheduleRefreshFromEvent();        }      };      haWs.onclose = () => {        haWs = null;        if (!haReconnectTimer) {          haReconnectTimer = setTimeout(() => { haReconnectTimer = null; connectHAEvents(); }, 5000);        }      };      haWs.onerror = () => {};    }    function toFixedSafe(v, digits) {      const n = Number(v);      return Number.isFinite(n) ? n.toFixed(digits) : null;    }    function formatState(ent) {      if (!ent || !ent.state || ent.state === 'unknown' || ent.state === 'unavailable') return '';      return ent.unit ? `${ent.state} ${ent.unit}` : `${ent.state}`;    }    function isSwitchEntity(ent) {      if (!ent) return false;      return ent.domain === 'switch' || ent.domain === 'input_boolean';    }    function isLightEntity(ent) {      if (!ent) return false;      return ent.domain === 'light';    }    function isSensorEntity(ent) {      if (!ent) return false;      return ent.domain === 'sensor';    }    function isAutomationEntity(ent, eid) {      if (ent && ent.domain === 'automation') return true;      return (eid || '').startsWith('automation.');    }    function setEntityStateInDemo(entityId, nextState) {      if (!demoData || !demoData.areas || !entityId) return false;      let changed = false;      demoData.areas.forEach(area => {        if (!area || !Array.isArray(area.all_entities)) return;        area.all_entities.forEach(ent => {          if (!ent || ent.id !== entityId) return;          ent.state = nextState;          changed = true;        });      });      return changed;    }    function PB_ToggleEntity(id, nextState, domain) {      if (!id || !nextState) return;      if (DEMO_MODE) {        if (setEntityStateInDemo(id, nextState)) updateUI(demoData);        return;      }      if (!window.OnJS_ToggleEntity) return;      window.OnJS_ToggleEntity(id, nextState, domain || '');    }    function parseDemoDataInline() {      if (!DEMO_DATA_INLINE) return null;      try { return JSON.parse(DEMO_DATA_INLINE); } catch (e) { console.error('Invalid inline demo JSON', e); return null; }    }    function loadDemoData() {      const inline = parseDemoDataInline();      if (inline) return Promise.resolve(inline);      return fetch(DEMO_DATA_URL, { cache: 'no-store' }).then(resp => {        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);        return resp.json();      });    }    function startDemoMode() {      const applyDemo = () => loadDemoData().then(data => {        demoData = data;        updateUI(data);      }).catch(err => {        showToast('Demo-Daten konnten nicht geladen werden');        console.error('Demo data load failed:', err);      });      applyDemo();      if (demoRefreshTimer) clearInterval(demoRefreshTimer);      demoRefreshTimer = setInterval(() => { if (!designMode) applyDemo(); }, DEMO_REFRESH_MS);    }    function updateUI(data) {      if (!data || !data.areas) return;      const legacyRefreshBtn = document.getElementById('refresh-btn');      if (legacyRefreshBtn) legacyRefreshBtn.remove();      lastUIData = data;      const areas = data.areas;      const configs = data.configs || {};      entityNames = {};      entityData = {};      areas.forEach(area => {        if (area.all_entities) {          area.all_entities.forEach(ent => { entityNames[ent.id] = ent.name; entityData[ent.id] = ent; });        }      });      const grid = document.getElementById('app-grid');      if (!grid) return;      const indexById = {};      areas.forEach((a, i) => { indexById[a.id] = i; });      const sortedAreas = areas.slice().sort((a, b) => {        const oa = (configs[a.id] && Number(configs[a.id].order)) || (100000 + indexById[a.id]);        const ob = (configs[b.id] && Number(configs[b.id].order)) || (100000 + indexById[b.id]);        return oa - ob;      });      const seen = {};      sortedAreas.forEach(area => {        const areaId = String(area.id || '');        seen[areaId] = true;        let card = null;        let isNewCard = false;        for (const child of grid.children) {          if (child.dataset && child.dataset.areaId === areaId) { card = child; break; }        }        if (!card) {          isNewCard = true;          card = document.createElement('div');          card.className = 'card';          card.dataset.areaId = areaId;          card.addEventListener('dragover', ev => {            if (!designMode || !dragAreaId) return;            ev.preventDefault();            const r = card.getBoundingClientRect();            const before = ev.clientY < (r.top + r.height / 2);            const grid = document.getElementById('app-grid');            if (grid) clearAreaDropMarkers(grid);            card.classList.add(before ? 'drop-before' : 'drop-after');          });          card.addEventListener('dragleave', () => { card.classList.remove('drop-before', 'drop-after'); });          card.addEventListener('drop', ev => {            if (!designMode || !dragAreaId) return;            ev.preventDefault();            const grid = document.getElementById('app-grid');            if (grid) clearAreaDropMarkers(grid);            const src = grid ? Array.from(grid.children).find(c => c.dataset && c.dataset.areaId === dragAreaId) : null;            if (!src || src === card) return;            const r = card.getBoundingClientRect();            const before = ev.clientY < (r.top + r.height / 2);            if (before) grid.insertBefore(src, card); else grid.insertBefore(src, card.nextSibling);            emitAreaOrder();          });          const header = document.createElement('div');          header.className = 'card-header';          const areaName = document.createElement('div');          areaName.className = 'area-name';          const areaSensors = document.createElement('div');          areaSensors.className = 'area-sensors';          header.appendChild(areaName);          header.appendChild(areaSensors);          const content = document.createElement('div');          content.className = 'card-content';          card.appendChild(header);          card.appendChild(content);        }        const areaName = card.querySelector('.area-name');        const areaSensors = card.querySelector('.area-sensors');        const content = card.querySelector('.card-content');        if (areaName) areaName.textContent = area.name || 'Unbekannt';        const areaCfg = configs[area.id] || {};        const isVisible = !(Number(areaCfg.visible) === 0);        card.classList.toggle('area-hidden', !isVisible);        if (areaSensors) {          const areaReg = areaRegistryById[String(area.id || '')] || {};          const regTempId = areaReg.temperature_entity_id || '';          const regHumidId = areaReg.humidity_entity_id || '';          const regTempEnt = regTempId ? entityData[regTempId] : null;          const regHumidEnt = regHumidId ? entityData[regHumidId] : null;          const tempSourceVal = (regTempEnt && regTempEnt.state && regTempEnt.state !== 'unknown' && regTempEnt.state !== 'unavailable') ? regTempEnt.state : ((area.temp_id && area.temp_val && area.temp_val !== 'unknown' && area.temp_val !== 'unavailable') ? area.temp_val : '');          const humidSourceVal = (regHumidEnt && regHumidEnt.state && regHumidEnt.state !== 'unknown' && regHumidEnt.state !== 'unavailable') ? regHumidEnt.state : ((area.humid_id && area.humid_val && area.humid_val !== 'unknown' && area.humid_val !== 'unavailable') ? area.humid_val : '');          const t = tempSourceVal !== '' ? toFixedSafe(tempSourceVal, 1) : null;          const h = humidSourceVal !== '' ? toFixedSafe(humidSourceVal, 0) : null;          const sensorKey = `${isVisible ? 1 : 0}|${t === null ? '' : t}|${h === null ? '' : h}`;          if (card.dataset.sensorKey !== sensorKey) {            areaSensors.textContent = '';            if (t !== null) {              const temp = document.createElement('div');              temp.className = 'sensor';              temp.innerHTML = `<span class='mdi mdi-thermometer'></span><span>${t}°</span>`;              areaSensors.appendChild(temp);            }            if (h !== null) {              const humid = document.createElement('div');              h
